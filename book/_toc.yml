# Configuration of _toc.yml file is explained in detail here: https://jupyterbook.org/en/stable/structure/toc.html and https://sphinx-external-toc.readthedocs.io/en/latest/user_guide/sphinx.html

format: jb-book
root: intro.md

parts:
  - caption: Introduction
    chapters:
    - file: introduction.md
  - caption: Chapter 1 History and Structure of the International Court of Justice
    chapters:
    - file: some_content/overview.md
      sections:
      - file: some_content/text_and_code.ipynb
  - caption: Chapter 2 Justice on Trial: Defining Moments in ICJ History
    chapters:
    - file: chapter2/introduction.md
      sections:
      - file: chapter2/introduction.md
      - file: chapter2/lotus_case.md
      - file: chapter2/chorzow_case.md
      - file: chapter2/corfu_channel_case.md
      - file: chapter2/nuclear_test_case.md
      - file: chapter2/tehran_hostages_case.md
      - file: chapter2/nicaragua_case.md
      - file: chapter2/bosnian_genocide_case.md
    - file: chapter2/conclusions.md
  - caption: Miscellaneous
    chapters:
    - file: references.md
    - file: changelog.md
    - file: credits.md
